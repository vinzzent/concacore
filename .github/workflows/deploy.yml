name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v6.0.2 # Fully updated, runs on Node 24 natively

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0 # Fully updated, runs on Node 24 natively
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site (Astro + Pagefind)
        run: npm run build

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v5.0.0 # Bypassing the missing floating tag bug
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0 # Updated deployment action